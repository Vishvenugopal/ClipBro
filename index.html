<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Clipboard</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="src/styles/editor.css">
  <link rel="stylesheet" href="src/styles/dialogs.css">
  <link rel="stylesheet" href="src/styles/animations.css">
</head>
<body>
  <!-- Title Bar -->
  <div id="titlebar">
    <div class="titlebar-drag">
      <div class="titlebar-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="4" stroke="url(#lg1)" stroke-width="2"/>
          <path d="M8 12h8M12 8v8" stroke="url(#lg1)" stroke-width="2" stroke-linecap="round"/>
          <defs><linearGradient id="lg1" x1="3" y1="3" x2="21" y2="21"><stop stop-color="#4cd964"/><stop offset="1" stop-color="#5ac8fa"/></linearGradient></defs>
        </svg>
        <span>Universal Clipboard</span>
      </div>
    </div>
    <div class="titlebar-controls">
      <button class="tb-btn minimize" id="titleMinBtn" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="tb-btn maximize" id="titleMaxBtn" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="tb-btn close" id="titleCloseBtn" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="app">
    <!-- === Pinned Folders Bar (TOP — large, animated, peek thumbnails) === -->
    <div id="pinnedFoldersBar" class="pinned-folders-bar">
      <div id="pinnedFoldersList" class="pinned-folders-list"></div>
      <button class="pinned-folder-add" id="addPinnedFolderBtn" title="Pin a folder">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <!-- === Three-column body === -->
    <div id="bodyLayout" class="body-layout">

      <!-- LEFT SIDEBAR: Recent Clips + Groups -->
      <aside id="leftSidebar" class="left-sidebar">
        <div class="sidebar-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search... (type: date: from: to: is:fav)" />
        </div>

        <!-- Recent clips (big thumbnails, scrollable) -->
        <div class="left-section left-section-recent">
          <div class="left-section-header">
            <span class="left-section-title">Recent Clips</span>
            <span class="left-section-count" id="recentClipCount">0</span>
          </div>
          <div id="recentClipsList" class="recent-clips-list"></div>
        </div>

        <!-- Groups by date -->
        <div class="left-section">
          <div class="left-section-header">
            <span class="left-section-title">By Date</span>
          </div>
          <div id="dateGroupsList" class="group-list"></div>
        </div>

        <!-- Groups by type -->
        <div class="left-section">
          <div class="left-section-header">
            <span class="left-section-title">By Type</span>
          </div>
          <div id="typeGroupsList" class="group-list"></div>
        </div>

        <!-- Bottom buttons -->
        <div class="sidebar-bottom-actions">
          <button class="sidebar-bottom-btn" id="hiddenFolderBtn" title="Hidden folder">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <span>Hidden</span>
          </button>
          <button class="sidebar-bottom-btn" id="settingsBtn" title="Settings">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <span>Settings</span>
          </button>
        </div>
      </aside>

      <!-- CENTER: Tab bar + Clip grid / Editor overlay -->
      <main id="centerPanel" class="center-panel">
        <!-- Tab Bar -->
        <div id="tabBar" class="tab-bar">
          <div id="tabList" class="tab-list"></div>
          <div class="tab-actions">
            <button class="tab-action-btn" id="selectModeBtn" title="Select multiple">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            </button>
            <button class="tab-action-btn" id="importBtn" title="Paste from clipboard">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
            </button>
            <button class="tab-action-btn" id="importFileBtn" title="Import file">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
            <button class="tab-action-btn" id="screenshotBtn" title="Screenshot">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
          </div>
        </div>

        <!-- Sort bar (shown when viewing a filtered group) -->
        <div id="sortBar" class="sort-bar" style="display:none">
          <button class="sort-back-btn" id="sortBackBtn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            All Clips
          </button>
          <span id="sortTitle" style="flex:1;font-size:12px;font-weight:600;color:var(--text-primary)"></span>
          <span class="sort-label">Sort:</span>
          <select id="sortSelect">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="az">A - Z</option>
            <option value="za">Z - A</option>
            <option value="largest">Largest</option>
            <option value="smallest">Smallest</option>
          </select>
        </div>

        <!-- Clip grid area -->
        <div id="clipArea" class="clip-area">
          <div id="emptyState" class="empty-state">
            <div class="empty-icon">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12h8M12 8v8"/></svg>
            </div>
            <h2>No clips yet</h2>
            <p>Copy something, take a screenshot, or import a file to get started.</p>
            <div class="empty-shortcuts">
              <div class="shortcut"><kbd>PrintScreen</kbd> Screenshot</div>
              <div class="shortcut"><kbd>Ctrl+Shift+S</kbd> Selection</div>
              <div class="shortcut"><kbd>Ctrl+V</kbd> Paste</div>
            </div>
          </div>
          <div id="clipGrid" class="clip-grid hidden"></div>
          <div id="selectionRect" class="selection-rect hidden"></div>
        </div>

        <!-- Settings View (replaces grid when active) -->
        <div id="settingsView" class="settings-view hidden"></div>

        <!-- Editor Overlay (covers center when editing a clip) -->
        <div id="editorOverlay" class="editor-overlay hidden">
          <div class="editor-overlay-header">
            <span id="editorClipTitle" class="editor-clip-title">Editing</span>
            <button class="editor-close-btn" id="closeEditorBtn" title="Close editor">&times;</button>
          </div>
          <div class="editor-canvas-wrapper">
            <div class="clip-glow" id="clipGlow"></div>
            <canvas id="editorCanvas"></canvas>
            <div id="textClipView" class="text-clip-view hidden"></div>
          </div>
          <div id="editorToolbar" class="editor-toolbar">
            <button class="tool-btn" data-tool="select" title="Select">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
            </button>
            <button class="tool-btn" data-tool="crop" title="Crop">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.13 1L6 16a2 2 0 002 2h15"/><path d="M1 6.13L16 6a2 2 0 012 2v15"/></svg>
            </button>
            <button class="tool-btn" data-tool="pen" title="Draw">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
            </button>
            <button class="tool-btn" data-tool="highlighter" title="Highlighter">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l-6 6v3h9l3-3"/><path d="M22 12l-4.6 4.6a2 2 0 01-2.8 0l-5.2-5.2a2 2 0 010-2.8L14 4"/></svg>
            </button>
            <button class="tool-btn" data-tool="arrow" title="Arrow">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
            <button class="tool-btn" data-tool="rectangle" title="Rectangle">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            </button>
            <button class="tool-btn" data-tool="text" title="Text">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9.5" y1="20" x2="14.5" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
            </button>
            <button class="tool-btn" data-tool="blur" title="Blur">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-dasharray="3 3"/></svg>
            </button>
            <div class="tool-separator"></div>
            <button class="tool-btn" data-tool="eraser" title="Eraser">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-9 8 8-4 4"/><path d="M6.5 13.5l5-5"/></svg>
            </button>
            <button class="tool-btn" data-tool="undo" title="Undo">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
            </button>
            <button class="tool-btn" data-tool="redo" title="Redo">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg>
            </button>
            <div class="tool-separator"></div>
            <div class="color-picker-group">
              <input type="color" id="toolColor" value="#ff3b30" class="tool-color-input" title="Color">
              <div class="tool-slider-group">
                <span class="tool-slider-label">Opacity</span>
                <input type="range" id="toolOpacity" min="0" max="100" value="100" class="tool-size-slider" title="Opacity">
              </div>
              <div class="tool-slider-group">
                <span class="tool-slider-label">Size</span>
                <input type="range" id="toolSize" min="1" max="20" value="3" class="tool-size-slider" title="Brush Size">
              </div>
            </div>
          </div>
          <!-- Action bar for the clip being edited -->
          <div class="editor-action-bar">
            <button class="action-btn" id="edCopyBtn" title="Copy"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy</button>
            <button class="action-btn" id="edSaveBtn" title="Save edits"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg> Save</button>
            <button class="action-btn" id="edSaveAsBtn" title="Save as..."><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export</button>
            <button class="action-btn" id="edShareBtn" title="Share"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share</button>
            <button class="action-btn" id="edOcrBtn" title="Extract Text"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Extract Text</button>
            <button class="action-btn" id="edAiBtn" title="Ask AI"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4v2a4 4 0 01-8 0V6a4 4 0 014-4z"/><path d="M16 14H8a4 4 0 00-4 4v2h16v-2a4 4 0 00-4-4z"/></svg> Ask AI</button>
            <button class="action-btn accent-red" id="edDeleteBtn" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg> Delete</button>
          </div>
        </div>

        <!-- Bulk action bar (shown during multi-select) -->
        <div id="bulkBar" class="bulk-bar hidden">
          <span id="bulkCount">0 selected</span>
          <button class="btn btn-danger" id="bulkDeleteBtn">Delete Selected</button>
        </div>
      </main>

      <!-- RIGHT SIDEBAR: File Explorer -->
      <aside id="rightSidebar" class="right-sidebar">
        <div class="explorer-header">
          <button class="explorer-nav-btn" id="explorerHomeBtn" title="App home folder">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </button>
          <button class="explorer-nav-btn" id="explorerBackBtn" title="Go back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="explorer-breadcrumb" id="explorerBreadcrumb"></div>
          <button class="explorer-nav-btn" id="explorerOpenExternalBtn" title="Open in Windows Explorer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>
        </div>
        <!-- Quick access -->
        <div class="explorer-quick-access" id="explorerQuickAccess"></div>
        <!-- File list -->
        <div class="explorer-file-list" id="explorerFileList"></div>
      </aside>
    </div>
  </div>

  <!-- Dialogs / Modals -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div id="modalContent" class="modal-content"></div>
  </div>

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Drop Zone Overlay (external files only) -->
  <div id="dropZone" class="drop-zone hidden">
    <div class="drop-zone-inner">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p>Drop files here to import</p>
    </div>
  </div>

  <script src="src/renderer/app.js"></script>
  <script src="src/renderer/editor.js"></script>
  <script src="src/renderer/dialogs.js"></script>
</body>
</html>
