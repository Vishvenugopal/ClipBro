<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Clipboard</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="src/styles/editor.css">
  <link rel="stylesheet" href="src/styles/dialogs.css">
  <link rel="stylesheet" href="src/styles/animations.css">
</head>
<body>
  <!-- Title Bar -->
  <div id="titlebar">
    <div class="titlebar-drag">
      <div class="titlebar-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="4" stroke="url(#lg1)" stroke-width="2"/>
          <path d="M8 12h8M12 8v8" stroke="url(#lg1)" stroke-width="2" stroke-linecap="round"/>
          <defs><linearGradient id="lg1" x1="3" y1="3" x2="21" y2="21"><stop stop-color="#4cd964"/><stop offset="1" stop-color="#5ac8fa"/></linearGradient></defs>
        </svg>
        <span>Universal Clipboard</span>
      </div>
    </div>
    <div class="titlebar-controls">
      <button class="tb-btn minimize" onclick="ucb.minimize()" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="tb-btn maximize" onclick="ucb.maximize()" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="tb-btn close" onclick="ucb.close()" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search clips..." />
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">QUICK ACCESS</div>
        <button class="sidebar-item active" data-view="all">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>All Clips</span>
          <span class="badge" id="allClipCount">0</span>
        </button>
        <button class="sidebar-item" data-view="favorites">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span>Favorites</span>
        </button>
        <button class="sidebar-item" data-view="recent">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span>Recent</span>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">
          FOLDERS
          <button class="sidebar-add-btn" id="addFolderBtn" title="New folder">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
        <div id="foldersList"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">GROUPS</div>
        <div id="groupsList"></div>
      </div>

      <div class="sidebar-section sidebar-bottom">
        <button class="sidebar-item" data-view="hidden" id="hiddenFolderBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <span>Hidden</span>
        </button>
        <button class="sidebar-item" data-view="settings" id="settingsBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <span>Settings</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="mainContent">
      <!-- Tab Bar -->
      <div id="tabBar">
        <div id="tabList"></div>
        <div class="tab-actions">
          <button class="tab-action-btn" id="importBtn" title="Import from clipboard (Ctrl+V)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
          </button>
          <button class="tab-action-btn" id="importFileBtn" title="Import file">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <button class="tab-action-btn" id="screenshotBtn" title="Take screenshot (PrintScreen)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </button>
        </div>
      </div>

      <!-- Clip View / Canvas Area -->
      <div id="clipArea">
        <!-- Empty state -->
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12h8M12 8v8"/></svg>
          </div>
          <h2>No clips yet</h2>
          <p>Copy something, take a screenshot, or import a file to get started.</p>
          <div class="empty-shortcuts">
            <div class="shortcut"><kbd>PrintScreen</kbd> Screenshot</div>
            <div class="shortcut"><kbd>Ctrl+Shift+S</kbd> Selection</div>
            <div class="shortcut"><kbd>Ctrl+V</kbd> Paste</div>
            <div class="shortcut"><kbd>Ctrl+Shift+V</kbd> Show App</div>
          </div>
        </div>

        <!-- Clip Grid View -->
        <div id="clipGrid" class="clip-grid hidden"></div>

        <!-- Clip Detail / Editor View -->
        <div id="clipDetail" class="clip-detail hidden">
          <div class="clip-canvas-wrapper">
            <div class="clip-glow" id="clipGlow"></div>
            <canvas id="editorCanvas"></canvas>
            <div id="textClipView" class="text-clip-view hidden"></div>
          </div>

          <!-- Editor Toolbar (circles/buttons) -->
          <div id="editorToolbar" class="editor-toolbar">
            <button class="tool-btn" data-tool="select" title="Select">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
            </button>
            <button class="tool-btn" data-tool="crop" title="Crop">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.13 1L6 16a2 2 0 002 2h15"/><path d="M1 6.13L16 6a2 2 0 012 2v15"/></svg>
            </button>
            <button class="tool-btn" data-tool="pen" title="Draw">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
            </button>
            <button class="tool-btn" data-tool="highlighter" title="Highlighter">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l-6 6v3h9l3-3"/><path d="M22 12l-4.6 4.6a2 2 0 01-2.8 0l-5.2-5.2a2 2 0 010-2.8L14 4"/></svg>
            </button>
            <button class="tool-btn" data-tool="arrow" title="Arrow">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
            <button class="tool-btn" data-tool="rectangle" title="Rectangle">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            </button>
            <button class="tool-btn" data-tool="text" title="Add Text">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9.5" y1="20" x2="14.5" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
            </button>
            <button class="tool-btn" data-tool="blur" title="Blur Region">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-dasharray="3 3"/></svg>
            </button>
            <div class="tool-separator"></div>
            <button class="tool-btn" data-tool="eraser" title="Eraser">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-9 8 8-4 4"/><path d="M6.5 13.5l5-5"/></svg>
            </button>
            <button class="tool-btn" data-tool="undo" title="Undo (Ctrl+Z)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
            </button>
            <button class="tool-btn" data-tool="redo" title="Redo (Ctrl+Y)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg>
            </button>
            <div class="tool-separator"></div>
            <div class="color-picker-group">
              <input type="color" id="toolColor" value="#ff3b30" class="tool-color-input" title="Color">
              <input type="range" id="toolSize" min="1" max="20" value="3" class="tool-size-slider" title="Size">
            </div>
          </div>
        </div>

        <!-- Settings View -->
        <div id="settingsView" class="settings-view hidden"></div>
      </div>

      <!-- Bottom Action Bar -->
      <div id="actionBar">
        <div class="action-left">
          <button class="action-btn" id="copyBtn" title="Copy to clipboard">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            <span>Copy</span>
          </button>
          <button class="action-btn" id="saveAsBtn" title="Save as...">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>Save</span>
          </button>
          <button class="action-btn" id="deleteBtn" title="Delete clip">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            <span>Delete</span>
          </button>
          <button class="action-btn" id="favBtn" title="Favorite">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span>Favorite</span>
          </button>
        </div>
        <div class="action-right">
          <button class="action-btn accent-green" id="shareBtn" title="Share">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            <span>Share</span>
          </button>
          <button class="action-btn accent-blue" id="aiBtn" title="Ask AI">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4v2a4 4 0 01-8 0V6a4 4 0 014-4z"/><path d="M16 14H8a4 4 0 00-4 4v2h16v-2a4 4 0 00-4-4z"/></svg>
            <span>Ask AI</span>
          </button>
          <button class="action-btn accent-yellow" id="ocrBtn" title="Extract Text">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>OCR</span>
          </button>
          <button class="action-btn" id="searchWebBtn" title="Search Web with Image">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
            <span>Search</span>
          </button>
          <button class="action-btn" id="highlightSearchBtn" title="Highlight to Search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/></svg>
            <span>Highlight</span>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Dialogs / Modals -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div id="modalContent" class="modal-content"></div>
  </div>

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Drop Zone Overlay -->
  <div id="dropZone" class="drop-zone hidden">
    <div class="drop-zone-inner">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p>Drop files here to import</p>
    </div>
  </div>

  <script src="src/renderer/app.js"></script>
  <script src="src/renderer/editor.js"></script>
  <script src="src/renderer/dialogs.js"></script>
</body>
</html>
